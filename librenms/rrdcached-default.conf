# /etc/default/rrdcached — Debian/Ubuntu init.d kulcs=érték formátum
#
# FONTOS: ez a fájl kulcs=érték párokat vár, NEM egy összefűzött
# OPTS="..." parancssor-stringet. Ha rossz formátumban írod meg, a
# rrdcached service el fog indulni, de a socket nem jön létre a várt
# helyen, és a LibreNMS validate.php "rrdcached connectivity test failed"
# hibát fog adni.
#
# Forrás: https://docs.librenms.org/Extensions/RRDCached/

DAEMON=/usr/bin/rrdcached
DAEMON_USER=librenms
DAEMON_GROUP=librenms

# Hol vannak az RRD adatbázis fájlok
BASE_PATH=/opt/librenms/rrd/

# Hol legyen a journal (crash-recovery)
JOURNAL_PATH=/var/lib/rrdcached/journal/

# PID és socket fájl - a LibreNMS alapértelmezetten ide néz
PIDFILE=/var/run/rrdcached.pid
SOCKFILE=/var/run/rrdcached.sock
SOCKGROUP=librenms

# Write delay tuning - production terhelésre optimalizálva
WRITE_JITTER=1800
WRITE_TIMEOUT=1800
WRITE_THREADS=4

BASE_OPTIONS="-B -F -R"

# Telepítés / alkalmazás után szükséges lépések:
#   mkdir -p /var/lib/rrdcached/journal
#   chown -R librenms:librenms /var/lib/rrdcached
#   chown librenms:librenms /opt/librenms/rrd
#   systemctl restart rrdcached
#
# LibreNMS oldali bekötés:
#   lnms config:set rrdcached "unix:/var/run/rrdcached.sock"
