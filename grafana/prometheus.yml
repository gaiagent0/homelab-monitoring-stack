global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - '10.10.40.11:9100'
          - '10.10.40.12:9100'
          - '10.10.40.13:9100'

  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - '10.10.40.32:8082'
